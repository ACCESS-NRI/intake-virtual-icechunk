{% set version = environ.get('GIT_DESCRIBE_TAG', '0.0.0').lstrip('v') %}

package:
  name: intake-virtual-icechunk
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/i/intake-virtual-icechunk/intake_virtual_icechunk-{{ version }}.tar.gz"

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python
    - pip
    - setuptools_scm
  run:
    - python >=3.10
    - intake >=0.7.0
    - icechunk
    - virtualizarr
    - intake-esm
    - zarr

test:
  imports:
    - intake_virtual_icechunk

about:
  home: https://github.com/ACCESS-NRI/intake-dataframe-catalog
  license: Apache Software
  license_family: APACHE
  summary: "An intake driver for a searchable table of intake sources and associated metadata"
  doc_url: https://intake-dataframe-catalog.readthedocs.io/en/latest/?badge=latest

extra:
  recipe-maintainers:
    - dougiesquire
